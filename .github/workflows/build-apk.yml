name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          # 建立專案
          cordova create myapp com.yourname.bookorder "圖書訂單APP"
          cd myapp
          cordova platform add android@12.0.0
          rm -rf www/*
          
          # 【升級防錯】自動搜尋專案中任何名為 index.html 的檔案並複製過去
          HTML_PATH=$(find .. -name "[iI]ndex.html*" | head -n 1)
          if [ -z "$HTML_PATH" ]; then
            echo "找不到任何 index.html 檔案！請確保你有上傳網頁檔案！"
            exit 1
          fi
          echo "成功找到網頁檔案：$HTML_PATH"
          cp "$HTML_PATH" www/index.html

      - name: Enable LocalStorage & Permissions
        run: |
          sed -i 's/<widget/<widget xmlns:android="http:\/\/://android.com\/apk\/res\/android"/g' myapp/config.xml

      - name: Build Android APK
        run: |
          cd myapp
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Book-Order-App-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
